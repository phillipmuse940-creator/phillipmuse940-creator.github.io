<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title><span class="bracket">&lt;</span>fire null<span class="bracket">&gt;</span></title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #1e1e1e;
      --accent:   #ff3c3c;
      --accent2:  #ff7a3c;
      --text:     #e8e8e8;
      --muted:    #555;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* ── background glow ── */
    .glow-orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,60,60,0.07) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .glow-orb-2 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,122,60,0.05) 0%, transparent 70%);
      bottom: -80px;
      right: -80px;
      pointer-events: none;
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 40px); }
    }

    /* ── layout ── */
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* ── header ── */
    .header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeUp 0.8s ease both;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(52px, 10vw, 96px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e8e8e8 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .name span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bracket {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 24px auto 0;
      border-radius: 2px;
    }

    /* ── cards ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 420px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      animation: fadeUp 0.8s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.15s; }
    .card:nth-child(2) { animation-delay: 0.25s; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card.discord::before {
      background: linear-gradient(135deg, rgba(88,101,242,0.08), transparent);
    }
    .card.youtube::before {
      background: linear-gradient(135deg, rgba(255,0,0,0.08), transparent);
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #2a2a2a;
    }
    .card:hover::before { opacity: 1; }

    .card.discord:hover { border-color: rgba(88,101,242,0.4); }
    .card.youtube:hover { border-color: rgba(255,0,0,0.35); }

    .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card.discord .icon-wrap { background: rgba(88,101,242,0.15); }
    .card.youtube .icon-wrap { background: rgba(255,0,0,0.12); }

    .icon-wrap svg { width: 22px; height: 22px; }

    .card-text { flex: 1; }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin-bottom: 3px;
    }
    .card-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .arrow {
      color: var(--muted);
      font-size: 18px;
      transition: transform 0.2s, color 0.2s;
    }
    .card:hover .arrow {
      transform: translateX(4px);
      color: var(--text);
    }

    /* ── footer ── */
    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
